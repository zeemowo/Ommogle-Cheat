<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      padding: 12px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4fc3f7;
      cursor: pointer;
    }
    .desc {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
      padding-left: 28px;
    }
  </style>
</head>
<body>
  <label>
    <input type="checkbox" id="autoClear">
    Auto clear localStorage
  </label>
  <div class="desc">Clears tracked keys on page load</div>
  <script src="popup.js"></script>
</body>
</html>
